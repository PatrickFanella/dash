services:
  almaz:
    build: .
    image: almaz:latest
    container_name: almaz
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://onnwee:Imb9t1qVgzP5v++4RXltyLyU2klIAT0J@postgres:5432/almaz?sslmode=disable
      - PROMETHEUS_URL=http://prometheus:9090
      - UPTIME_KUMA_URL=http://uptime-kuma:3001
      - UPTIME_KUMA_SLUG=default
      - LISTEN_ADDR=:8080
    healthcheck:
      test: ["CMD", "/almaz", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dev
      - monitoring
      - management

networks:
  dev:
    external: true
  monitoring:
    external: true
  management:
    external: true
