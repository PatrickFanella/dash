pageInfo:
  title: ALMAZ // NERV
  description: Command & Control
  logo: >-
    https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/Nerv_logo.svg/180px-Nerv_logo.svg.png
  footerText: ''
  navLinks:
    - title: Grafana
      path: https://grafana.subcult.tv
    - title: Uptime
      path: https://uptime.subcult.tv
    - title: Portainer
      path: https://portainer.subcult.tv
appConfig:
  theme: dashy-docs
  startingView: default
  statusCheck: true
  statusCheckInterval: 60
  language: en
  layout: horizontal
  iconSize: medium
  hideComponents:
    hideFooter: true
    hideHeading: true
    hideNav: true
    hideSearch: false
    hideSettings: true
  webSearch:
    searchEngine: duckduckgo
    openingMethod: newtab
    disableWebSearch: false
    openUrlsDirectly: false
    searchBangs: {}
  enableFontAwesome: true
  cssThemes:
    - ''
  customColors:
    eva-unit-01:
      primary: '#bb86fc'
      background: '#0a000e'
      background-darker: '#05000a'
      item-group-background: '#0f051a'
      item-background: '#0d0315'
      item-background-hover: '#1a0a2e'
      item-text-color: '#e0d0f0'
      item-text-color-hover: '#00ff88'
      item-group-outer-background: '#7c21a6'
      item-group-heading-text-color: '#bb86fc'
      item-group-heading-text-color-hover: '#00ff88'
      item-shadow: '1px 1px 6px #0a000ecc'
      item-hover-shadow: 0 0 15px rgba(0, 255, 136, 0.25), 0 0 30px rgba(156, 39, 176, 0.15)
      item-group-shadow: 'inset 0 2px 1px rgba(187, 134, 252, 0.3), 1px 1px 4px #000000cc'
      heading-text-color: '#bb86fc'
      nav-link-text-color: '#bb86fc'
      nav-link-text-color-hover: '#00ff88'
      nav-link-background-color: '#0f051a'
      nav-link-background-color-hover: '#1a0a2e'
      nav-link-border-color: '#2a1040'
      nav-link-border-color-hover: '#00ff88'
      nav-link-shadow: '1px 1px 3px #000'
      nav-link-shadow-hover: 0 0 12px rgba(0, 255, 136, 0.35)
      search-container-background: '#0f051a'
      search-field-background: '#0a000e'
      search-label-color: '#bb86fc'
      settings-text-color: '#bb86fc'
      settings-background: '#0a000e'
      config-settings-color: '#bb86fc'
      config-settings-background: '#0f051a'
      interactive-editor-color: '#bb86fc'
      interactive-editor-background: '#0a000e'
      interactive-editor-background-darker: '#0f051a'
      widget-text-color: '#bb86fc'
      widget-background-color: '#0f051a'
      widget-accent-color: '#0a000e'
      scroll-bar-color: '#7c21a6'
      scroll-bar-background: '#0a000e'
      status-check-tooltip-background: '#0f051a'
      description-tooltip-background: '#0f051a'
      footer-background: '#0f051a'
      login-form-background: '#0f051a'
      welcome-popup-background: '#7c21a6'
      welcome-popup-text-color: '#e0d0f0'
      info: '#00b0ff'
      success: '#00ff88'
      warning: '#ff6a00'
      danger: '#ff1744'
      neutral: '#1a0a2e'
      curve-factor: 2px
  defaultOpeningMethod: newtab
  faviconApi: allesedv
  routingMode: history
  enableMultiTasking: false
  widgetsAlwaysUseProxy: false
  enableMaterialDesignIcons: true
  auth:
    enableGuestAccess: false
    users: []
    enableOidc: false
    oidc:
      adminRole: 'false'
      adminGroup: 'false'
    enableHeaderAuth: false
    headerAuth:
      userHeader: REMOTE_USER
      proxyWhitelist: []
    enableKeycloak: false
  showSplashScreen: false
  preventWriteToDisk: false
  preventLocalSave: false
  disableConfiguration: false
  disableConfigurationForNonAdmin: false
  allowConfigEdit: true
  enableServiceWorker: false
  disableContextMenu: false
  disableUpdateChecks: false
  disableSmartSort: false
  enableErrorReporting: false
sections:
  - name: SYNAPSE // Overview
    icon: fas fa-satellite-dish
    displayData:
      collapsed: false
      cols: 2
    widgets:
      - type: clock
        options:
          timeZone: America/Chicago
          format: en-US
          hideDate: false
        id: 0_1560_clock
      - type: gl-uptime
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 1_1560_gluptime
      - type: public-ip
        useProxy: true
        id: 2_1560_publicip
      - type: gl-system-load
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 3_1560_glsystemload
  - name: SYNAPSE // CPU & Memory
    icon: fas fa-microchip
    displayData:
      collapsed: false
      cols: 2
    widgets:
      - type: gl-current-cpu
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 0_1672_glcurrentcpu
      - type: gl-current-mem
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 1_1672_glcurrentmem
      - type: gl-cpu-history
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
          limit: 300
        id: 2_1672_glcpuhistory
      - type: gl-mem-history
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
          limit: 300
        id: 3_1672_glmemhistory
  - name: SYNAPSE // Network & Temp
    icon: fas fa-network-wired
    displayData:
      collapsed: false
      cols: 2
    widgets:
      - type: gl-network-interfaces
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 0_1959_glnetworkinterfaces
      - type: gl-cpu-temp
        options:
          hostname: https://glances.subcult.tv
          apiVersion: 4
        id: 1_1959_glcputemp
  - name: SYNAPSE // Service Status
    icon: fas fa-heartbeat
